<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LifeCraft - Collage & Video Creator</title>
  
  <!-- 1. BULLETPROOF CACHING & RESOURCE ERROR TRACKER -->
  <script>
    // 'true' at the end enables a capturing listener to catch failed script tags (like blocked CDNs)
    window.addEventListener('error', function(e) {
      const debugBox = document.getElementById('runtimeDebugLog');
      if (debugBox) {
        debugBox.style.display = 'block';
        const target = e.target || e.srcElement;
        if (target && (target.tagName === 'SCRIPT' || target.tagName === 'LINK')) {
          debugBox.innerHTML += `<div>❌ <b>Resource Blocked:</b> Failed to load library from: <br><small>${target.src || target.href}</small></div>`;
        } else {
          debugBox.innerHTML += `<div>❌ <b>Script Bug:</b> ${e.message}<br><small>at ${e.filename || 'unknown'}:${e.lineno || 0}</small></div>`;
        }
      }
    }, true); 

    window.addEventListener('unhandledrejection', function(e) {
      const debugBox = document.getElementById('runtimeDebugLog');
      if (debugBox) {
        debugBox.style.display = 'block';
        debugBox.innerHTML += `<div>⚠️ <b>Promise Failure:</b> ${e.reason}</div>`;
      }
    });
  </script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght=700&family=Cinzel:wght=700&family=Fredoka+One&family=Montserrat:wght=700&display=swap" rel="stylesheet">
  
  <!-- FALLBACK DESIGN: If CDN fails, we initialize securely -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

  <style>
    :root {
      --primary: #FF6B6B;
      --secondary: #4ECDC4;
      --accent: #FFE66D;
      --dark: #2F2F2F;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      color: var(--dark);
      min-height: 100vh;
      padding-bottom: 30px;
    }

    header {
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      color: white;
      padding: 15px;
      text-align: center;
    }

    /* DEBUG BOX - INSANELY VISIBLE FORCED BACKUP LAYOUT */
    #runtimeDebugLog {
      background: #fff3e0;
      color: #e65100;
      border: 3px solid #ffb74d;
      padding: 15px;
      margin: 15px auto;
      max-width: 470px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 0.9rem;
      display: block; /* Forced open by default to show status immediately! */
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 15px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }

    h3 {
      margin-bottom: 12px;
      font-size: 1.1rem;
      border-left: 4px solid var(--primary);
      padding-left: 8px;
    }

    /* HARDWARE FIXED WIDTH LOCKS */
    .canvas-container-wrapper {
      display: block;
      width: 360px !important;
      height: 360px !important;
      margin: 0 auto 15px auto;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      border: 3px dashed var(--secondary);
      position: relative;
    }

    .canvas-container {
      width: 360px !important;
      height: 360px !important;
      margin: 0 auto;
    }

    .control-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    select, input[type="text"], input[type="number"] {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
    }

    .grid-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 15px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-secondary { background: var(--secondary); }
    .btn-accent { background: #ffb900; color: var(--dark); }
    .btn-danger { background: #e74c3c; }
    .hidden-input { display: none; }

    .transform-controls {
      background: #f9f9f9;
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
      display: none;
    }

    .range-flex {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .range-flex input { flex: 1; }

    .text-format-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .text-format-bar select { flex: 1; min-width: 120px; }

    .color-picker-wrapper {
      display: flex;
      gap: 4px;
      align-items: center;
      flex: 1;
    }

    .color-picker-wrapper input[type="color"] {
      width: 100%;
      height: 40px;
      cursor: pointer;
    }

    .status-log {
      text-align: center;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--primary);
    }
  </style>
</head>
<body>

  <header>
    <h1>🎨 LifeCraft</h1>
  </header>

  <!-- This panel starts visible now to guarantee you know the script layout engine is alive -->
  <div id="runtimeDebugLog">
    ⚙️ <b>System Diagnostics Panel:</b> Waiting for page lifecycle load...
  </div>

  <div class="container">
    <div class="card">
      <div class="canvas-container-wrapper">
        <canvas id="collageCanvas" width="360" height="360"></canvas>
      </div>
      
      <div class="status-log" id="statusLog">Capture photos to start!</div>

      <div class="transform-controls" id="transformControls">
        <label>Selected Photo Tuning:</label>
        <div class="range-flex">
          <span>📐 Angle</span>
          <input type="range" id="angleSlider" min="0" max="360" value="0">
        </div>
        <div class="range-flex">
          <span>🔍 Size</span>
          <input type="range" id="scaleSlider" min="0.1" max="2" step="0.05" value="1">
        </div>
        <button class="btn btn-danger" style="width: 100%;" onclick="deleteSelectedObj()">🗑️ Remove Photo</button>
      </div>
    </div>

    <div class="card">
      <h3>📸 Import & Layout</h3>
      <div class="grid-buttons">
        <button class="btn" onclick="document.getElementById('cameraLoader').click()">📸 Take Photo</button>
        <button class="btn btn-secondary" onclick="document.getElementById('galleryLoader').click()">🖼️ Open Gallery</button>
      </div>
      
      <input type="file" id="cameraLoader" class="hidden-input" accept="image/*" capture="environment">
      <input type="file" id="galleryLoader" class="hidden-input" accept="image/*" multiple>

      <div class="grid-buttons">
        <button class="btn btn-accent" onclick="generateRandomLayout()">🔀 Mix Positions</button>
        <button class="btn btn-danger" onclick="clearAllImages()">🚨 Reset Canvas</button>
      </div>

      <div class="control-group">
        <label for="themeSelect">✨ Select Event Theme</label>
        <select id="themeSelect" onchange="applyThemeDecoration()">
          <option value="none">Plain / Minimalist</option>
          <option value="birthday">🎉 Happy Birthday</option>
          <option value="anniversary">💖 Anniversary</option>
          <option value="vacation">🌴 Holiday & Travel</option>
          <option value="graduation">🎓 Graduation Day</option>
        </select>
      </div>
    </div>

    <div class="card">
      <h3>✍️ Typography & Banner Styling</h3>
      <div class="control-group">
        <label for="customText">Custom Event Text</label>
        <input type="text" id="customText" placeholder="Type custom message here..." oninput="updateCustomText()">
        
        <div class="text-format-bar">
          <div class="color-picker-wrapper">
            <label style="font-size:0.75rem;">Text:</label>
            <input type="color" id="textColor" value="#ffffff" onchange="updateCustomText()">
          </div>
          <div class="color-picker-wrapper">
            <label style="font-size:0.75rem;">Bg:</label>
            <input type="color" id="textBgColor" value="#ff4a75" onchange="updateCustomText()">
          </div>
          
          <select id="fontStyle" onchange="updateCustomText()">
            <option value="Montserrat">Montserrat</option>
            <option value="Arial">Arial</option>
            <option value="Cinzel">Cinzel</option>
            <option value="Caveat">Caveat</option>
            <option value="Fredoka One">Fredoka</option>
          </select>
          <select id="textAlignment" onchange="updateCustomText()">
            <option value="center">Center</option>
            <option value="left">Left</option>
            <option value="right">Right</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>🎞️ Exporter</h3>
      <div class="grid-buttons">
        <button class="btn" onclick="downloadCollageImage()">💾 Save Image (JPG)</button>
        <button class="btn btn-accent" onclick="exportAnimatedVideo()">🎬 Export Video (MP4)</button>
      </div>
    </div>
  </div>

  <script>
    let canvas;
    let uploadedImages = [];
    let borderFrame = null;
    let textObject = null;

    window.addEventListener('load', () => {
      const debugBox = document.getElementById('runtimeDebugLog');
      try {
        if (typeof fabric === 'undefined') {
          debugBox.style.background = '#ffebee';
          debugBox.style.color = '#c62828';
          throw new Error("Fabric.js completely missing! The browser blocked the CDN connection script.");
        }

        canvas = new fabric.Canvas('collageCanvas', {
          width: 360,
          height: 360,
          backgroundColor: '#ffffff',
          preserveObjectStacking: true
        });
        
        canvas.calcOffset();
        canvas.renderAll();

        // If successful, minimize diagnostic presence
        debugBox.style.background = '#e8f5e9';
        debugBox.style.color = '#2e7d32';
        debugBox.style.borderColor = '#81c784';
        debugBox.innerHTML = "✅ <b>Success:</b> Fabric.js engine is running and layout coordinates are locked!";
        
        setTimeout(() => { debugBox.style.display = 'none'; }, 4000);

      } catch (err) {
        debugBox.style.background = '#ffebee';
        debugBox.style.color = '#c62828';
        debugBox.innerHTML = `<div>❌ <b>Init Crash:</b> ${err.message}</div>`;
      }
    });

    // RE-INJECTED ESSENTIAL HANDLERS PREVENTING EXECUTION CRASHES
    function handleImageFiles(files) {
      if(!canvas || !files.length) return;
      for (let i = 0; i < files.length; i++) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const imgElement = new Image();
          imgElement.onload = function() {
            const fabricImg = new fabric.Image(imgElement, {
              left: 50, top: 50, cornerColor: '#4ECDC4', cornerSize: 24
            });
            fabricImg.scaleToWidth(140);
            canvas.add(fabricImg);
            uploadedImages.push(fabricImg);
            canvas.renderAll();
          };
          imgElement.src = e.target.result;
        };
        reader.readAsDataURL(files[i]);
      }
    }
    document.getElementById('cameraLoader').addEventListener('change', function(e) { handleImageFiles(e.target.files); });
    document.getElementById('galleryLoader').addEventListener('change', function(e) { handleImageFiles(e.target.files); });
    function clearAllImages() { if(canvas) { canvas.clear(); canvas.setBackgroundColor('#ffffff', canvas.renderAll.bind(canvas)); uploadedImages=[]; } }
    function downloadCollageImage() { if(!canvas) return; const url = canvas.toDataURL({format:'jpeg'}); const a = document.createElement('a'); a.download='collage.jpg'; a.href=url; a.click(); }
  </script>
</body>
</html>
